# Route Q allowlisted experiment search space.
# LLM may only propose experiments within these bounds.
# All values are enumerated — no continuous ranges.

search_space:
  training:
    lr: [0.0005, 0.0008, 0.0010, 0.0012, 0.0015]
    warmup_steps: [0, 25, 50, 100, 200]
    weight_decay: [0.0, 0.0001, 0.001, 0.01]
    scheduler: ["cosine", "linear", "none"]  # none = constant after warmup

  model:
    pairrefine_blocks: [1, 2, 3]
    pairrefine_channels: [8, 16, 32]
    pairrefine_dropout: [0.0, 0.1, 0.2]

  pair_residual:
    enabled: [false, true]
    type: ["conv2d"]
    kernel_size: [3, 5]
    residual_scale: [0.05, 0.1, 0.2]
    init: ["zero", "random"]

  decode:
    nussinov_gamma: [1.0, 2.0, 3.0]
    pair_threshold: [0.25, 0.35, 0.45]

  loss:
    lambda_pair: [3.0, 5.0, 7.0]
    pair_positive_weight: [5.0, 10.0, 15.0]

# Fields that must NOT appear in any proposal
forbidden:
  - semantic_tokens
  - preference
  - reranker
  - hard_replay
  - query_adapter
  - tag_aux
  - struct_aux
  - importance
  - structural_importance
  - PairLossPolicy
  - relation_mask
  - typed
  - coach
  - curriculum
  - synthetic_only
  - pair_loss_policy
  - rna_fm
  - llm_online
  - llm_in_forward
